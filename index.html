<!DOCTYPE html>

      margin: 0;
      background: #f4f4f4;

    header {
      background: #333;
      color: #fff;
      padding: 1rem;
      text-align: center;
    }
    nav a {
      color: white;
      margin: 0 10px;

      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    footer {
      text-align: center;
      padding: 10px;
      background: #333;
      color: white;
    }

<body>

<header>
  <h1>Your Name</h1>

</header>

<section>

<footer>

</html>
